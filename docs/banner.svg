<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Nordic Standard — the engineering conventions every astronordic repository follows">
  <title>The Nordic Standard</title>
  <defs>
    <clipPath id="panel">
      <rect x="2" y="2" width="1276" height="416" rx="24"/>
    </clipPath>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientTransform="translate(180 60) rotate(40) scale(420)">
      <stop stop-color="#E8E8EC" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#E8E8EC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientTransform="translate(1120 340) rotate(-140) scale(460)">
      <stop stop-color="#8A8F98" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#8A8F98" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTop" cx="0" cy="0" r="1" gradientTransform="translate(760 -40) rotate(100) scale(380)">
      <stop stop-color="#B9C0CE" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#B9C0CE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="82" y1="150" x2="82" y2="212" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#B9C0CE"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#FFFFFF" stroke-opacity="0.04" fill="none"/>
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="46"/>
    </filter>
  </defs>

  <rect x="2" y="2" width="1276" height="416" rx="24" fill="#0A0A0C"/>
  <g clip-path="url(#panel)">
    <g filter="url(#soft)">
      <rect x="2" y="2" width="1276" height="416" fill="url(#glowLeft)"/>
      <rect x="2" y="2" width="1276" height="416" fill="url(#glowRight)"/>
      <rect x="2" y="2" width="1276" height="416" fill="url(#glowTop)"/>
    </g>
    <rect x="2" y="2" width="1276" height="416" fill="url(#grid)"/>
  </g>
  <rect x="2.5" y="2.5" width="1275" height="415" rx="23.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <!-- wordmark -->
  <text x="82" y="205" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-1.3" fill="url(#wordmark)">The Nordic Standard</text>

  <!-- eyebrow -->
  <text x="84" y="258" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', 'Cascadia Code', 'Segoe UI Mono', Consolas, monospace" font-size="21" font-weight="500" letter-spacing="5" fill="#8A8F98">ENGINEERING CONVENTIONS &#183; @ASTRONORDIC</text>

  <!-- tagline -->
  <text x="84" y="300" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="500" fill="#8A8F98">Consistency is <tspan fill="#E8E8EC">the feature</tspan>.</text>
</svg>
