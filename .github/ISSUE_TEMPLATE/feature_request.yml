name: "Feature request"
description: "Suggest an idea or improvement"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "The problem"
      description: "What are you trying to do?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution"
      description: "What would you like to happen?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives"
      description: "Other approaches you considered."
    validations:
      required: false
