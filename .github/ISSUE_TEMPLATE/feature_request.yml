name: "✨ Feature request · Sugerir melhoria"
description: "Suggest an idea or improvement · Sugira uma ideia ou melhoria"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "The problem · O problema"
      description: "What are you trying to do? · O que você está tentando fazer?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed solution · Solução proposta"
      description: "What would you like to happen? · O que você gostaria que acontecesse?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives · Alternativas"
      description: "Other approaches you considered. · Outras abordagens que você considerou."
    validations:
      required: false
