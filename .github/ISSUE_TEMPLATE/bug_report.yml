name: "Bug report"
description: "Report something that isn't working"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the report! Please fill in what you can."
  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "Describe the bug and what you expected instead."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to reproduce"
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "Version & environment"
      placeholder: "e.g. v0.1.0 · macOS 15.1 / Node 20.9"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: "Logs / screenshots"
      description: "Anything else that helps."
    validations:
      required: false
